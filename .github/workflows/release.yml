name: release

# Builds installers for macOS, Linux, and Windows and publishes them to a
# GitHub Release. Triggered by pushing a version tag (e.g. `v0.2.0`), or
# manually from the Actions tab (provide the tag to create).
#
#   git tag v0.2.0 && git push origin v0.2.0
#
# macOS builds on your self-hosted Mac (free, no 10x macOS billing); Linux and
# Windows build on GitHub-hosted runners (1x / 2x). The release is created as a
# DRAFT — review the assets, then publish it.
on:
  push:
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      tag:
        description: "Version tag to build and release (e.g. v0.2.0). Created on the current commit if it doesn't exist."
        required: true

# tauri-action needs write access to create the release and upload assets.
permissions:
  contents: write

jobs:
  release:
    strategy:
      fail-fast: false
      matrix:
        include:
          # GitHub-hosted Mac (Apple Silicon), universal (arm64 + x86_64).
          # Hosted runners have a real security session, so signing +
          # notarization with APPLE_CERTIFICATE work reliably (self-hosted
          # background runners hit errSecInternalComponent). Release builds are
          # infrequent, so the 10x macOS billing stays well within the free tier.
          - platform: macos
            runner: macos-latest
            args: "--target universal-apple-darwin"
          - platform: linux
            runner: ubuntu-22.04
            args: ""
          - platform: windows
            runner: windows-latest
            args: ""
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v4

      # --- Linux system dependencies (GitHub-hosted only) ---
      - name: Install Linux system dependencies
        if: matrix.platform == 'linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libxdo-dev \
            libssl-dev \
            patchelf \
            build-essential \
            file

      # --- Toolchains (all runners are GitHub-hosted) ---
      - name: Install Rust (stable)
        uses: dtolnay/rust-toolchain@stable

      - name: Add macOS universal targets
        if: matrix.platform == 'macos'
        run: rustup target add aarch64-apple-darwin x86_64-apple-darwin

      - name: Cache Rust build
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: "./src-tauri -> target"

      - name: Install Bun
        uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build and publish release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Updater artifact signing (all platforms). `createUpdaterArtifacts`
          # is on, so every build signs the update bundle with this minisign key
          # — its public half lives in tauri.conf.json → plugins.updater.pubkey.
          # Without these the build fails at the bundling step.
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          # macOS code signing + notarization. Used only by the macOS job
          # (Linux/Windows ignore these). All read from repo secrets, so the
          # build stays unsigned until you add them — then it signs+notarizes
          # automatically with no further changes.
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          # The cert + private key as a base64 .p12. Tauri imports these into a
          # fresh temporary keychain it unlocks itself — so signing does NOT
          # depend on the runner's (background LaunchAgent) login keychain,
          # which it can't unlock (errSecInternalComponent).
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          # Notarization — method A: Apple ID + app-specific password.
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          # Notarization — method B (recommended): App Store Connect API key.
          # Whichever set you fill in gets used; the .p8 lives on your Mac and
          # APPLE_API_KEY_PATH is its absolute path.
          APPLE_API_ISSUER: ${{ secrets.APPLE_API_ISSUER }}
          APPLE_API_KEY: ${{ secrets.APPLE_API_KEY }}
          APPLE_API_KEY_PATH: ${{ secrets.APPLE_API_KEY_PATH }}
        with:
          tagName: ${{ inputs.tag || github.ref_name }}
          releaseName: "Reviewly ${{ inputs.tag || github.ref_name }}"
          releaseBody: "Download the installer for your platform below."
          releaseDraft: false
          prerelease: false
          args: ${{ matrix.args }}

      # Mirror the built installers to the PUBLIC site repo (volnei/reviewly-app)
      # so the landing-page download links work for everyone — this repo is
      # private. Needs a fine-grained PAT with Contents:write on reviewly-app,
      # stored as the SITE_RELEASE_TOKEN secret. Inert (skips) until that exists.
      # Creates a DRAFT release there so you publish it on launch.
      - name: Publish installers to the public site repo
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.SITE_RELEASE_TOKEN }}
          TAG: ${{ inputs.tag || github.ref_name }}
          SITE_REPO: volnei/reviewly-app
        run: |
          if [ -z "$GH_TOKEN" ]; then
            echo "SITE_RELEASE_TOKEN not set — skipping public mirror."
            exit 0
          fi
          gh release view "$TAG" --repo "$SITE_REPO" >/dev/null 2>&1 \
            || gh release create "$TAG" --repo "$SITE_REPO" \
                 --title "Reviewly $TAG" \
                 --notes "Download the installer for your platform below." \
                 --draft || true
          files=$(find src-tauri/target -type f \( \
            -name "*.dmg" -o -name "*.app.tar.gz" -o -name "*.msi" \
            -o -name "*-setup.exe" -o -name "*.AppImage" -o -name "*.deb" \
            -o -name "*.rpm" \) 2>/dev/null)
          if [ -n "$files" ]; then
            echo "Uploading to $SITE_REPO@$TAG:"; echo "$files"
            gh release upload "$TAG" --repo "$SITE_REPO" --clobber $files
          else
            echo "No installers found to upload."
          fi

  # Give the release assets clear, OS-first names (Reviewly-<ver>-macos.dmg,
  # …-windows-setup.exe, …-linux.AppImage, …) instead of Tauri's arch-based
  # defaults, then rewrite the updater manifest's URLs to match. Runs once,
  # after every platform has uploaded. Leaves the updater bundle
  # (*.app.tar.gz), the *.sig files, and latest.json's signatures untouched.
  rename-assets:
    needs: release
    runs-on: ubuntu-latest
    steps:
      - name: Rename installers & fix the updater manifest
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          TAG: ${{ inputs.tag || github.ref_name }}
        run: |
          set -euo pipefail
          VER="${TAG#v}"
          rid=$(gh api "repos/$REPO/releases" --jq ".[] | select(.tag_name==\"$TAG\") | .id" | head -1)
          echo "release $rid ($TAG)"
          declare -A MAP
          while IFS=$'\t' read -r id name; do
            case "$name" in
              *.dmg)       new="Reviewly-$VER-macos.dmg" ;;
              *-setup.exe) new="Reviewly-$VER-windows-setup.exe" ;;
              *.msi)       new="Reviewly-$VER-windows.msi" ;;
              *.AppImage)  new="Reviewly-$VER-linux.AppImage" ;;
              *.deb)       new="Reviewly-$VER-linux.deb" ;;
              *.rpm)       new="Reviewly-$VER-linux.rpm" ;;
              *) continue ;;  # leave *.app.tar.gz, *.sig, latest.json
            esac
            [ "$name" = "$new" ] && continue
            gh api -X PATCH "repos/$REPO/releases/assets/$id" -f name="$new" >/dev/null
            MAP["$name"]="$new"
            echo "renamed $name -> $new"
          done < <(gh api "repos/$REPO/releases/$rid/assets" --jq '.[] | "\(.id)\t\(.name)"')
          # The updater manifest points at the installers by URL — rewrite those
          # to the new names so auto-update keeps working (Windows/Linux use the
          # installer directly; macOS uses the untouched *.app.tar.gz).
          if [ "${#MAP[@]}" -gt 0 ] && gh release download "$TAG" --repo "$REPO" --pattern latest.json --dir . --clobber 2>/dev/null; then
            changed=0
            for old in "${!MAP[@]}"; do
              if grep -qF "$old" latest.json; then
                python3 -c "import sys; p='latest.json'; open(p,'w').write(open(p).read().replace(sys.argv[1], sys.argv[2]))" "$old" "${MAP[$old]}"
                changed=1
              fi
            done
            if [ "$changed" = 1 ]; then
              # Replace the manifest. `gh release upload` (with or without
              # --clobber) intermittently fails here with HTTP 400 "Bad
              # Content-Length", which can leave the release without any
              # latest.json. Delete the old asset via the API, then upload the
              # new one with curl straight to the uploads endpoint — curl sets
              # Content-Length from the file, sidestepping the gh bug.
              aid=$(gh api "repos/$REPO/releases/$rid/assets" --jq '.[] | select(.name=="latest.json") | .id')
              [ -n "$aid" ] && gh api -X DELETE "repos/$REPO/releases/assets/$aid" >/dev/null || true
              curl -sS --fail-with-body -X POST \
                -H "Authorization: token $GH_TOKEN" \
                -H "Content-Type: application/json" \
                --data-binary @latest.json \
                "https://uploads.github.com/repos/$REPO/releases/$rid/assets?name=latest.json" >/dev/null
              echo "latest.json updated to renamed installers"
            fi
          fi
